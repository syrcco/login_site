<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Sign In &mdash; Kaemito</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Crect x='2' y='2' width='32' height='32' rx='8' fill='%234f46e5'/%3E%3Cpolyline points='8,18 12,18 15,10 18,26 21,14 24,18 28,18' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <a href="/" class="logo">
          <svg viewBox="0 0 36 36" fill="none"><rect x="2" y="2" width="32" height="32" rx="8" fill="#4f46e5"/><polyline points="8,18 12,18 15,10 18,26 21,14 24,18 28,18" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="logo-text">Kaemito</span>
        </a>
        <h1>Sign in to your account</h1>
        <p>Infrastructure Observability Platform</p>
      </div>

      <div class="auth-card">
        <div id="login-alert" class="alert"></div>

        <form id="login-form" autocomplete="off">
          <div class="form-group">
            <label class="form-label" for="email">Email address</label>
            <input class="form-input" type="email" id="email" name="email"
                   placeholder="you@company.com" autocomplete="email">
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="password-wrapper">
              <input class="form-input" type="password" id="password" name="password"
                     placeholder="Enter your password" autocomplete="current-password">
              <button type="button" class="password-toggle">Show</button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-checkbox">
              <input type="checkbox" name="remember">
              Remember this device
            </label>
          </div>

          <button type="submit" class="btn btn-primary">Sign In</button>

          <div class="divider">or</div>

          <button type="button" id="sso-btn" class="btn btn-secondary">Sign in with SSO</button>
        </form>

        <div class="auth-links">
          <a href="forgot-password.html">Forgot your password?</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div>&copy; 2026 Kaemito, Inc. All rights reserved.</div>
    <div class="footer-links">
      <a href="terms.html">Terms</a>
      <span class="footer-sep">&middot;</span>
      <a href="privacy.html">Privacy</a>
      <span class="footer-sep">&middot;</span>
      <a href="status.html">Status</a>
    </div>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
